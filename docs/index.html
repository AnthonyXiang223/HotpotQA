<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HotpotQA 多跳推理探索平台</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- vis-network -->
  <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/dist/vis-network.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/dist/vis-network.min.css" rel="stylesheet">

  <!-- lunr.js -->
  <script src="https://cdn.jsdelivr.net/npm/lunr@2.3.9/lunr.min.js"></script>

  <!-- 自定义样式 -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-900 text-gray-100 h-screen overflow-hidden">

  <!-- 顶栏 -->
  <header class="bg-gray-800 border-b border-gray-700 px-4 py-3 flex items-center gap-4 z-50">
    <h1 class="text-xl font-bold text-blue-400 whitespace-nowrap">
      🔍 HotpotQA 探索器
    </h1>
    <div class="flex-1 max-w-2xl relative">
      <input
        type="text"
        id="search-input"
        placeholder="搜索问题、事实、文档……（例如：'film director'、'sports team'、'award'）"
        class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-gray-100 placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-sm"
      />
      <div id="search-suggestions" class="absolute top-full left-0 right-0 mt-1 bg-gray-800 border border-gray-600 rounded-lg shadow-xl z-50 hidden max-h-80 overflow-y-auto"></div>
    </div>
    <div class="flex items-center gap-3 text-sm text-gray-400 whitespace-nowrap">
      <span id="graph-stats">加载中……</span>
    </div>
  </header>

  <!-- 主布局 -->
  <div class="flex h-[calc(100vh-64px)]">

    <!-- 左侧边栏 -->
    <aside class="w-80 bg-gray-800 border-r border-gray-700 flex flex-col overflow-hidden">
      <!-- 搜索/聚类标签页 -->
      <div class="flex border-b border-gray-700">
        <button id="tab-search" class="flex-1 px-3 py-2 text-sm font-medium text-blue-400 border-b-2 border-blue-400 bg-gray-750">搜索结果</button>
        <button id="tab-clusters" class="flex-1 px-3 py-2 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-200">聚类</button>
      </div>

      <!-- 搜索结果面板 -->
      <div id="panel-search" class="flex-1 overflow-y-auto p-3">
        <div id="search-results" class="space-y-2">
          <p class="text-gray-500 text-sm text-center mt-8">在上方搜索框中输入查询</p>
        </div>
      </div>

      <!-- 聚类面板 -->
      <div id="panel-clusters" class="flex-1 overflow-y-auto p-3 hidden">
        <div id="cluster-stats" class="text-xs text-gray-500 mb-3"></div>
        <div id="cluster-list" class="space-y-2"></div>
      </div>
    </aside>

    <!-- 中间：可视化 -->
    <main class="flex-1 relative bg-gray-900">
      <div id="graph-container" class="w-full h-full"></div>
      <!-- 浮动控制按钮 -->
      <div class="absolute top-3 right-3 flex flex-col gap-2 z-10">
        <button id="btn-fit" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded text-xs border border-gray-600" title="适应视图">⊞ 适应</button>
        <button id="btn-reset" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded text-xs border border-gray-600" title="重置视图">↺ 重置</button>
      </div>
      <!-- 图例 -->
      <div class="absolute bottom-3 left-3 bg-gray-800/90 rounded-lg p-2 border border-gray-700 z-10 text-xs">
        <div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 rounded-full bg-blue-500 inline-block"></span> 问题</div>
        <div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 rounded bg-green-500 inline-block"></span> 文档</div>
        <div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 rounded bg-yellow-500 inline-block"></span> 支持性事实</div>
        <div class="flex items-center gap-2"><span class="w-3 h-3 rounded bg-red-500 inline-block" style="clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)"></span> 实体</div>
      </div>
    </main>

    <!-- 右侧详情面板 -->
    <aside class="w-96 bg-gray-800 border-l border-gray-700 flex flex-col overflow-hidden">
      <div class="px-4 py-3 border-b border-gray-700">
        <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wide">问题详情</h2>
      </div>
      <div id="detail-content" class="flex-1 overflow-y-auto p-4">
        <p class="text-gray-500 text-sm text-center mt-8">
          点击图谱中的问题节点<br>查看其多跳推理链
        </p>
      </div>
    </aside>

  </div>

  <!-- 加载遮罩 -->
  <div id="loading-overlay" class="fixed inset-0 bg-gray-900/80 flex items-center justify-center z-[100]">
    <div class="text-center">
      <div class="animate-spin w-10 h-10 border-4 border-blue-400 border-t-transparent rounded-full mx-auto mb-4"></div>
      <p class="text-gray-300">正在加载 HotpotQA 数据……</p>
      <p id="loading-progress" class="text-gray-500 text-sm mt-2"></p>
    </div>
  </div>

  <!-- Toast 通知 -->
  <div id="toast" class="fixed bottom-4 right-4 bg-gray-800 border border-gray-600 text-gray-200 px-4 py-2 rounded-lg shadow-lg z-[200] opacity-0 transition-opacity duration-300 pointer-events-none text-sm"></div>

  <!-- 应用脚本 -->
  <script src="js/graph.js?v=11"></script>
  <script src="js/search.js?v=11"></script>
  <script src="js/cluster.js?v=11"></script>
  <script src="js/visualize.js?v=11"></script>
  <script src="js/app.js?v=11"></script>
</body>
</html>
